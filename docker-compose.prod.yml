version: '3'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    volumes:
      - ./data:/app/data  # Persistent volume for database
    environment:
      - DATABASE_URL=sqlite:///./data/sql_app.db  # Database in persistent location
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - fastapi
    restart: unless-stopped
