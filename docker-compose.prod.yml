version: '3'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    volumes:
      - ./data:/app/data  # Persistent volume for database
    environment:
      - DATABASE_URL=sqlite:///./data/sql_app.db  # Database in persistent location
      - NODE_ENV=production
      - EVENT_CODE=${EVENT_CODE:?Set EVENT_CODE for participant registration}
      - COORDINATOR_CODE=${COORDINATOR_CODE:?Set COORDINATOR_CODE for coordinator access}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:?Set SESSION_SECRET_KEY for signed cookies}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    depends_on:
      - fastapi
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN:?Set APP_DOMAIN to the public domain name}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
